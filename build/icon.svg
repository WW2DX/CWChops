<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#243043"/>
      <stop offset="1" stop-color="#0e1218"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4aa3ff"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
  </defs>

  <!-- rounded-square backplate -->
  <rect x="72" y="72" width="880" height="880" rx="208" fill="url(#bg)"/>
  <rect x="72" y="72" width="880" height="880" rx="208" fill="none"
        stroke="#3a4a60" stroke-width="6" opacity="0.7"/>

  <!-- CW wordmark -->
  <text x="512" y="455" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="400" fill="#eef4fb"
        letter-spacing="-10">CW</text>

  <!-- CW sine carrier -->
  <path d="M 286 632 Q 349 548 412 632 T 538 632 T 664 632 T 738 632"
        fill="none" stroke="url(#accent)" stroke-width="26"
        stroke-linecap="round"/>

  <!-- CHOPS -->
  <text x="512" y="812" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-weight="700" font-size="138" fill="#8fb6e6"
        letter-spacing="26">CHOPS</text>
</svg>
