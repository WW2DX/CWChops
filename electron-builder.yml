appId: org.cwops.cwchops
productName: CWChops
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
# No native modules — storage uses the built-in node:sqlite, so nothing to rebuild.
npmRebuild: false
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
win:
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: HamRadio
  maintainer: WW2DX <lee@remotehamradio.com>
